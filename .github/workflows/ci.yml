name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:

  ci:
    name: CI
    runs-on: macos-15
    env:
      SWIFTLINT_VERSION: "0.63.2"

    steps:
      - uses: actions/checkout@v4

      # ── 1. Typos ────────────────────────────────────────────────────────────
      - name: Install typos
        run: brew install typos-cli

      - name: Check for typos
        run: typos

      # ── 2. SwiftFormat ──────────────────────────────────────────────────────
      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        # --lint exits non-zero if any file would be reformatted, without writing changes.
        run: swiftformat --lint .

      # ── 3. SwiftLint ────────────────────────────────────────────────────────
      - name: Install SwiftLint ${{ env.SWIFTLINT_VERSION }}
        run: |
          curl -fsSL \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/SwiftLint.pkg" \
            -o /tmp/swiftlint.pkg
          sudo installer -pkg /tmp/swiftlint.pkg -target /
          swiftlint version

      - name: Lint
        # github-actions-logging emits ::error / ::warning annotations
        # that appear inline in the PR diff view.
        run: swiftlint lint --force-exclude --strict --reporter github-actions-logging

      # ── 4. Build & Test ─────────────────────────────────────────────────────
      - name: Select Xcode 26.0.1 (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0.1'

      - name: Resolve Xcode build version
        run: echo "XCODE_BUILD=$(xcodebuild -version | tail -1 | awk '{print $NF}')" >> "$GITHUB_ENV"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-xcode-${{ env.XCODE_BUILD }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-xcode-${{ env.XCODE_BUILD }}-

      - name: Build & test with coverage
        run: swift test --enable-code-coverage

      # ── 5. Coverage upload ─────────────────────────────────────────────────
      # SPM packages don't produce an xcresult bundle, so we go straight from
      # llvm-cov to lcov format — which Codecov ingests natively.
      - name: Export coverage as lcov
        run: |
          PROFDATA=$(find .build -name 'default.profdata' | head -1)
          TEST_BIN=$(find .build -name '*PackageTests.xctest' -print -quit)/Contents/MacOS/$(basename "$(find .build -name '*PackageTests.xctest' -print -quit)" .xctest)
          mkdir -p .build
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile "$PROFDATA" \
            "$TEST_BIN" \
            -ignore-filename-regex '(Tests|checkouts|debug/|release/|messages\.pb\.swift)' \
            > .build/coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: .build/coverage.lcov
          slug: Sajjon/Zesame
          # CODECOV_TOKEN must be added to the repo's Actions secrets.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
