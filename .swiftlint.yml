disabled_rules:
  - trailing_newline
  - trailing_whitespace
  - todo
  # SwiftFormat puts { on its own line for multi-line protocol conformance lists;
  # SwiftLint's opening_brace rule conflicts with that style.
  - opening_brace
  # force_try is used in known-safe contexts (static min/max constants, proto serialization).
  - force_try
  # Keystore and JSON model types intentionally use nested enums/structs.
  - nesting

opt_in_rules:
  # Require every function/method with 2+ parameters to place each on its own line.
  - multiline_parameters

multiline_parameters:
  # Forbid single-line declarations with 2+ parameters; each parameter must be on its own line.
  allows_single_line: false

# SwiftFormat's --commas always adds trailing commas in multi-line collections;
# require them here so both tools agree.
trailing_comma:
  mandatory_comma: true

included:
  - Sources
  - Tests

excluded:
- Sources/Zesame/Models/Protobuf/messages.pb.swift   # auto-generated by protoc

line_length: 200

type_name:
  min_length: 2
  max_length:
    warning: 80
    error: 120

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 80
  ignores_comments: true

function_parameter_count:
  warning: 5
  error: 6

# Complexity / cognitive-load metric.
cyclomatic_complexity:
  warning: 15
  error: 20

# Allow crypto math variables (x, y, z, n, k, r, s) and long descriptive names.
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - i
    - id
